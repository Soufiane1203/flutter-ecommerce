name: ecommerce_app
description: Application e-commerce Flutter professionnelle - Téléphones, PC et Gadgets
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # API et Réseau
  dio: ^5.4.0
  http: ^1.1.0

  # Persistance locale
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI et Images
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  image_picker: ^1.0.5
  file_picker: ^6.1.1

  # Notifications et messages
  fluttertoast: ^8.2.4

  # Formatage et utilitaires
  intl: ^0.19.0
  
  # Icons
  cupertino_icons: ^1.0.6

  # Formulaires et validation
  formz: ^0.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  # Assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
